<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0e1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Position Calc">
<title>Position Calculator</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #0a0e1a;
  --bg-card: #131826;
  --bg-input: #1a2030;
  --border: #232b3d;
  --text: #e8ecf4;
  --text-dim: #8892a8;
  --accent: #4d9fff;
  --accent-dim: #2d6db8;
  --green: #26d97f;
  --red: #ff5560;
  --yellow: #ffb547;
}
html, body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  overscroll-behavior: none;
}
body {
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  max-width: 520px;
  margin: 0 auto;
}
.app { padding: 12px 14px 24px; }
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 4px 16px;
}
header h1 { font-size: 17px; font-weight: 600; letter-spacing: 0.3px; }
header .deposit-display {
  font-size: 13px;
  color: var(--text-dim);
}
header .deposit-display b { color: var(--text); font-weight: 600; }
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 12px;
}
.card-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  margin-bottom: 10px;
  font-weight: 600;
}
.row {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
}
.row:last-child { margin-bottom: 0; }
.field { flex: 1; min-width: 0; }
.field label {
  display: block;
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 5px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
input[type="number"], input[type="text"], select {
  width: 100%;
  background: var(--bg-input);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 17px;
  padding: 12px 12px;
  border-radius: 10px;
  font-variant-numeric: tabular-nums;
  font-feature-settings: "tnum";
  -webkit-appearance: none;
  appearance: none;
  font-weight: 500;
}
input[type="number"]:focus, input[type="text"]:focus, select:focus {
  outline: none;
  border-color: var(--accent);
  background: #1d2538;
}
input::-webkit-outer-spin-button, input::-webkit-inner-spin-button {
  -webkit-appearance: none; margin: 0;
}
input[type=number] { -moz-appearance: textfield; }
select {
  background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='%238892a8'%3e%3cpath d='M8 11L3 6h10z'/%3e%3c/svg%3e");
  background-repeat: no-repeat;
  background-position: right 12px center;
  background-size: 14px;
  padding-right: 36px;
}
.toggle {
  display: flex;
  background: var(--bg-input);
  border-radius: 10px;
  padding: 3px;
  border: 1px solid var(--border);
}
.toggle button {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text-dim);
  padding: 9px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.toggle button.active {
  background: var(--accent);
  color: #fff;
}
.preset-row {
  display: flex;
  gap: 6px;
  margin-top: 8px;
}
.preset-row button {
  flex: 1;
  background: var(--bg-input);
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 8px 4px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}
.preset-row button.active {
  background: var(--accent-dim);
  border-color: var(--accent);
  color: #fff;
}
.direction-toggle {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}
.direction-toggle button {
  flex: 1;
  background: var(--bg-input);
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 11px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.5px;
  cursor: pointer;
}
.direction-toggle button.long.active {
  background: var(--green);
  color: #06120a;
  border-color: var(--green);
}
.direction-toggle button.short.active {
  background: var(--red);
  color: #1a0608;
  border-color: var(--red);
}
.result-card {
  background: linear-gradient(160deg, #18213a 0%, #131826 100%);
  border: 1px solid var(--accent-dim);
}
.result-main {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 14px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
}
.result-main .label {
  font-size: 13px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.8px;
}
.result-main .lot-value {
  font-size: 38px;
  font-weight: 700;
  color: var(--accent);
  font-variant-numeric: tabular-nums;
  letter-spacing: -1px;
}
.result-main .units-value {
  font-size: 12px;
  color: var(--text-dim);
  text-align: right;
  margin-top: 4px;
}
.result-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px 14px;
}
.result-grid .item .lbl {
  font-size: 11px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 2px;
}
.result-grid .item .val {
  font-size: 16px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
}
.val.green { color: var(--green); }
.val.red { color: var(--red); }
.val.yellow { color: var(--yellow); }
.warning {
  display: none;
  margin-top: 12px;
  padding: 10px 12px;
  background: rgba(255, 85, 96, 0.1);
  border: 1px solid var(--red);
  border-radius: 10px;
  color: var(--red);
  font-size: 13px;
  line-height: 1.4;
}
.warning.visible { display: block; }
.warning.warn-margin { background: rgba(255, 181, 71, 0.1); border-color: var(--yellow); color: var(--yellow); }
.copy-btn {
  width: 100%;
  margin-top: 12px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 12px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}
.copy-btn:active { background: var(--accent-dim); }
.deposit-edit {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 4px 8px;
  cursor: pointer;
}
.deposit-edit input {
  background: transparent;
  border: none;
  color: var(--text);
  font-size: 14px;
  width: 90px;
  padding: 4px 0;
  font-weight: 600;
}
.deposit-edit input:focus { outline: none; }
.lev-row { display: flex; gap: 6px; }
.lev-row select { font-size: 14px; padding: 8px 36px 8px 10px; }
footer {
  text-align: center;
  font-size: 11px;
  color: var(--text-dim);
  padding: 16px 8px 0;
  line-height: 1.5;
}
.swap-btn {
  background: var(--bg-input);
  border: 1px solid var(--border);
  color: var(--text-dim);
  border-radius: 8px;
  padding: 8px 10px;
  font-size: 12px;
  cursor: pointer;
  margin-top: 6px;
  width: 100%;
}
.parsed-hint {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 4px;
  padding-left: 4px;
  font-variant-numeric: tabular-nums;
  min-height: 14px;
}
.parsed-hint.ok { color: var(--green); }
.parsed-hint.err { color: var(--red); }
.rr-presets-label {
  font-size: 11px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-top: 12px;
  margin-bottom: 6px;
}
.rr-presets {
  display: flex;
  gap: 6px;
}
.rr-presets button {
  flex: 1;
  background: var(--bg-input);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 9px 4px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  font-variant-numeric: tabular-nums;
}
.rr-presets button:active {
  background: var(--accent-dim);
  border-color: var(--accent);
}
input.input-error {
  border-color: var(--red) !important;
  background: rgba(255, 85, 96, 0.08) !important;
}
</style>
</head>
<body>
<div class="app">

<header>
  <h1>Position Calc</h1>
  <div class="deposit-display">
    Депозит:
    <span class="deposit-edit">
      $<input type="number" id="deposit" inputmode="decimal" step="100" value="10000">
    </span>
  </div>
</header>

<!-- Инструмент -->
<div class="card">
  <div class="card-title">Инструмент</div>
  <select id="instrument">
    <optgroup label="Forex Majors (USD-quote)">
      <option value="EURUSD" data-type="fx_usd_quote" data-pip="0.0001" data-digits="5">EUR/USD</option>
      <option value="GBPUSD" data-type="fx_usd_quote" data-pip="0.0001" data-digits="5">GBP/USD</option>
      <option value="AUDUSD" data-type="fx_usd_quote" data-pip="0.0001" data-digits="5">AUD/USD</option>
      <option value="NZDUSD" data-type="fx_usd_quote" data-pip="0.0001" data-digits="5">NZD/USD</option>
    </optgroup>
    <optgroup label="Forex USD-base">
      <option value="USDJPY" data-type="fx_usd_base_jpy" data-pip="0.01" data-digits="3">USD/JPY</option>
      <option value="USDCHF" data-type="fx_usd_base" data-pip="0.0001" data-digits="5">USD/CHF</option>
      <option value="USDCAD" data-type="fx_usd_base" data-pip="0.0001" data-digits="5">USD/CAD</option>
    </optgroup>
    <optgroup label="JPY Crosses">
      <option value="EURJPY" data-type="fx_cross_jpy" data-pip="0.01" data-digits="3" data-quote="JPY">EUR/JPY</option>
      <option value="GBPJPY" data-type="fx_cross_jpy" data-pip="0.01" data-digits="3" data-quote="JPY">GBP/JPY</option>
      <option value="AUDJPY" data-type="fx_cross_jpy" data-pip="0.01" data-digits="3" data-quote="JPY">AUD/JPY</option>
      <option value="CADJPY" data-type="fx_cross_jpy" data-pip="0.01" data-digits="3" data-quote="JPY">CAD/JPY</option>
      <option value="CHFJPY" data-type="fx_cross_jpy" data-pip="0.01" data-digits="3" data-quote="JPY">CHF/JPY</option>
    </optgroup>
    <optgroup label="Forex Crosses">
      <option value="EURGBP" data-type="fx_cross" data-pip="0.0001" data-digits="5" data-quote="GBP">EUR/GBP</option>
      <option value="EURCHF" data-type="fx_cross" data-pip="0.0001" data-digits="5" data-quote="CHF">EUR/CHF</option>
      <option value="EURAUD" data-type="fx_cross" data-pip="0.0001" data-digits="5" data-quote="AUD">EUR/AUD</option>
      <option value="EURCAD" data-type="fx_cross" data-pip="0.0001" data-digits="5" data-quote="CAD">EUR/CAD</option>
      <option value="GBPAUD" data-type="fx_cross" data-pip="0.0001" data-digits="5" data-quote="AUD">GBP/AUD</option>
      <option value="GBPCAD" data-type="fx_cross" data-pip="0.0001" data-digits="5" data-quote="CAD">GBP/CAD</option>
      <option value="GBPCHF" data-type="fx_cross" data-pip="0.0001" data-digits="5" data-quote="CHF">GBP/CHF</option>
      <option value="AUDCAD" data-type="fx_cross" data-pip="0.0001" data-digits="5" data-quote="CAD">AUD/CAD</option>
      <option value="AUDNZD" data-type="fx_cross" data-pip="0.0001" data-digits="5" data-quote="NZD">AUD/NZD</option>
    </optgroup>
    <optgroup label="Metals">
      <option value="XAUUSD" data-type="metal_xau" data-pip="0.01" data-digits="2">XAU/USD (Gold)</option>
      <option value="XAGUSD" data-type="metal_xag" data-pip="0.001" data-digits="3">XAG/USD (Silver)</option>
    </optgroup>
    <optgroup label="Indices CFD">
      <option value="US30" data-type="index" data-pip="1" data-digits="2" data-cs="1">US30 (Dow)</option>
      <option value="NAS100" data-type="index" data-pip="1" data-digits="2" data-cs="1">NAS100 (Nasdaq)</option>
      <option value="SPX500" data-type="index" data-pip="1" data-digits="2" data-cs="1">SPX500 (S&P)</option>
      <option value="GER40" data-type="index" data-pip="1" data-digits="2" data-cs="1">GER40 (DAX)</option>
      <option value="UK100" data-type="index" data-pip="1" data-digits="2" data-cs="1">UK100 (FTSE)</option>
    </optgroup>
  </select>
  <div class="lev-row" style="margin-top:10px">
    <div class="field" style="flex:1">
      <label>Плечо</label>
      <select id="leverage">
        <option value="100">1:100</option>
        <option value="200">1:200</option>
        <option value="300">1:300</option>
        <option value="500" selected>1:500</option>
        <option value="1000">1:1000</option>
      </select>
    </div>
    <div class="field" style="flex:2">
      <label>Курс quote→USD <span id="quote-hint" style="color:var(--text-dim);font-size:10px"></span></label>
      <input type="number" id="quote-rate" inputmode="decimal" step="0.0001" placeholder="авто" disabled>
    </div>
  </div>
</div>

<!-- Риск -->
<div class="card">
  <div class="card-title">Риск</div>
  <div class="toggle" id="risk-mode">
    <button data-mode="percent" class="active">% от депо</button>
    <button data-mode="usd">$ фикс.</button>
  </div>
  <div class="row" style="margin-top:10px">
    <div class="field">
      <input type="number" id="risk-value" inputmode="decimal" step="0.1" value="1">
    </div>
  </div>
  <div class="preset-row" id="presets">
    <button data-val="0.5">0.5%</button>
    <button data-val="1" class="active">1%</button>
    <button data-val="1.5">1.5%</button>
    <button data-val="2">2%</button>
    <button data-val="3">3%</button>
  </div>
</div>

<!-- Сделка -->
<div class="card">
  <div class="card-title">Уровни сделки</div>
  <div class="direction-toggle" id="direction">
    <button class="long active" data-dir="long">LONG</button>
    <button class="short" data-dir="short">SHORT</button>
  </div>
  <div class="row">
    <div class="field">
      <label>Вход (Entry)</label>
      <input type="text" id="entry" inputmode="decimal" autocomplete="off" placeholder="0.00000">
      <div class="parsed-hint" id="entry-hint"></div>
    </div>
    <div class="field">
      <label>Стоп (SL)</label>
      <input type="text" id="stop" inputmode="decimal" autocomplete="off" placeholder="0.00000">
      <div class="parsed-hint" id="stop-hint"></div>
    </div>
  </div>
  <div class="row">
    <div class="field">
      <label>Тейк (TP) — опционально</label>
      <input type="text" id="take" inputmode="decimal" autocomplete="off" placeholder="0.00000">
      <div class="parsed-hint" id="take-hint"></div>
    </div>
  </div>
  <div class="rr-presets-label">📌 Подставить TP для RR:</div>
  <div class="rr-presets" id="rr-presets">
    <button data-rr="1.5">1:1.5</button>
    <button data-rr="2">1:2</button>
    <button data-rr="3">1:3</button>
    <button data-rr="4">1:4</button>
    <button data-rr="5">1:5</button>
  </div>
  <button class="swap-btn" id="swap-btn">↕ Поменять Entry / Stop местами</button>
</div>

<!-- Результат -->
<div class="card result-card">
  <div class="result-main">
    <div>
      <div class="label">Размер позиции</div>
      <div class="lot-value" id="lots">—</div>
    </div>
    <div>
      <div class="units-value" id="units">— units</div>
      <div class="units-value" id="pip-value-info">—</div>
    </div>
  </div>
  <div class="result-grid">
    <div class="item">
      <div class="lbl">Риск</div>
      <div class="val red" id="risk-result">—</div>
    </div>
    <div class="item">
      <div class="lbl">Прибыль (TP)</div>
      <div class="val green" id="profit-result">—</div>
    </div>
    <div class="item">
      <div class="lbl">SL дистанция</div>
      <div class="val" id="sl-distance">—</div>
    </div>
    <div class="item">
      <div class="lbl">R:R</div>
      <div class="val yellow" id="rr-result">—</div>
    </div>
    <div class="item">
      <div class="lbl">Маржа</div>
      <div class="val" id="margin-result">—</div>
    </div>
    <div class="item">
      <div class="lbl">% депо в марже</div>
      <div class="val" id="margin-pct">—</div>
    </div>
  </div>
  <div class="warning" id="warning"></div>
  <button class="copy-btn" id="copy-btn">📋 Скопировать сводку</button>
</div>

<footer>
  Лот округляется до 0.01 в МЕНЬШУЮ сторону.<br>
  Не финансовая рекомендация. Проверяй параметры перед открытием позиции.
</footer>

</div>

<script>
// =========== STATE ===========
const state = {
  riskMode: 'percent',
  direction: 'long',
};

// =========== ELEMENTS ===========
const $ = id => document.getElementById(id);
const els = {
  deposit: $('deposit'),
  instrument: $('instrument'),
  leverage: $('leverage'),
  quoteRate: $('quote-rate'),
  quoteHint: $('quote-hint'),
  riskValue: $('risk-value'),
  entry: $('entry'),
  stop: $('stop'),
  take: $('take'),
  lots: $('lots'),
  units: $('units'),
  pipInfo: $('pip-value-info'),
  riskResult: $('risk-result'),
  profitResult: $('profit-result'),
  slDistance: $('sl-distance'),
  rrResult: $('rr-result'),
  marginResult: $('margin-result'),
  marginPct: $('margin-pct'),
  warning: $('warning'),
};

// =========== STORAGE ===========
const STORE_KEY = 'pos_calc_v1';

// =========== БЕЗОПАСНЫЙ ПАРСЕР ЦЕН ===========
// Принимает запятую и точку, обрезает пробелы, возвращает число или NaN
function parsePrice(str) {
  if (str === null || str === undefined) return NaN;
  let s = String(str).trim();
  if (s === '') return NaN;
  // Убираем пробелы внутри (например "1 000.00")
  s = s.replace(/\s+/g, '');
  // Заменяем запятую на точку
  s = s.replace(',', '.');
  // Если в строке остались две и более точки — невалидно
  if ((s.match(/\./g) || []).length > 1) return NaN;
  const n = parseFloat(s);
  if (isNaN(n)) return NaN;
  return n;
}

// Показать распарсенное значение под полем
function updateParsedHint(inputEl, hintEl, digits) {
  const raw = inputEl.value;
  if (!raw || raw.trim() === '') {
    hintEl.textContent = '';
    hintEl.className = 'parsed-hint';
    inputEl.classList.remove('input-error');
    return;
  }
  const n = parsePrice(raw);
  if (isNaN(n) || n <= 0) {
    hintEl.textContent = '⚠ не число';
    hintEl.className = 'parsed-hint err';
    inputEl.classList.add('input-error');
    return;
  }
  hintEl.textContent = '= ' + n.toFixed(digits);
  hintEl.className = 'parsed-hint ok';
  inputEl.classList.remove('input-error');
}
function saveState() {
  const s = {
    deposit: els.deposit.value,
    instrument: els.instrument.value,
    leverage: els.leverage.value,
    quoteRate: els.quoteRate.value,
    riskMode: state.riskMode,
    riskValue: els.riskValue.value,
    direction: state.direction,
    entry: els.entry.value,
    stop: els.stop.value,
    take: els.take.value,
  };
  try { localStorage.setItem(STORE_KEY, JSON.stringify(s)); } catch(e) {}
}
function loadState() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (!raw) return;
    const s = JSON.parse(raw);
    if (s.deposit) els.deposit.value = s.deposit;
    if (s.instrument) els.instrument.value = s.instrument;
    if (s.leverage) els.leverage.value = s.leverage;
    if (s.quoteRate) els.quoteRate.value = s.quoteRate;
    if (s.riskMode) {
      state.riskMode = s.riskMode;
      document.querySelectorAll('#risk-mode button').forEach(b => {
        b.classList.toggle('active', b.dataset.mode === s.riskMode);
      });
    }
    if (s.riskValue) els.riskValue.value = s.riskValue;
    if (s.direction) {
      state.direction = s.direction;
      document.querySelectorAll('#direction button').forEach(b => {
        b.classList.toggle('active', b.dataset.dir === s.direction);
      });
    }
    if (s.entry) els.entry.value = s.entry;
    if (s.stop) els.stop.value = s.stop;
    if (s.take) els.take.value = s.take;
  } catch(e) {}
}

// =========== CORE CALC ===========
// Pip value per 1 standard lot in USD
// Все формулы для стандартного лота (100 000 базовой валюты для FX)
function getPipValuePerLot(instrument, entry, quoteRate) {
  const opt = instrument.selectedOptions[0];
  const type = opt.dataset.type;
  const pipSize = parseFloat(opt.dataset.pip);
  const cs = parseFloat(opt.dataset.cs || 100000);

  // Forex XXX/USD: pip value = pipSize * 100000
  // 0.0001 * 100000 = $10/лот
  if (type === 'fx_usd_quote') {
    return pipSize * 100000;
  }
  // Forex USD/XXX (USD/CHF, USD/CAD): pip value = (pipSize * 100000) / entry
  if (type === 'fx_usd_base') {
    if (!entry || entry <= 0) return null;
    return (pipSize * 100000) / entry;
  }
  // USD/JPY: pip 0.01, lot 100000 JPY => pip value = (0.01 * 100000) / entry = 1000 / entry
  if (type === 'fx_usd_base_jpy') {
    if (!entry || entry <= 0) return null;
    return (pipSize * 100000) / entry;
  }
  // JPY crosses (EURJPY и т.д.): pip = 0.01, quote = JPY
  // pip value (USD) = (0.01 * 100000) / USDJPY_rate
  // USDJPY_rate ≈ entry / EURUSD_rate, но проще запросить курс quote→USD
  // Если quoteRate указан — используем его (это USD/JPY курс)
  if (type === 'fx_cross_jpy') {
    if (!quoteRate || quoteRate <= 0) return null;
    return (pipSize * 100000) / quoteRate;
  }
  // Прочие кроссы (EUR/GBP и т.д.): pip value = pipSize * 100000 * (quoteRate USD per quote)
  // например EUR/GBP: quote=GBP, нужен курс GBP/USD
  if (type === 'fx_cross') {
    if (!quoteRate || quoteRate <= 0) return null;
    return pipSize * 100000 * quoteRate;
  }
  // Gold: 1 lot = 100 oz, pip = 0.01 => $1 за пункт
  // Контрактный размер 100, pip 0.01 → 0.01 * 100 = $1
  if (type === 'metal_xau') {
    return pipSize * 100; // $1
  }
  // Silver: 1 lot = 5000 oz, pip = 0.001 => $5 за пункт... 
  // Стандартно у большинства брокеров 5000 oz. 0.001 * 5000 = $5
  if (type === 'metal_xag') {
    return pipSize * 5000;
  }
  // Indices: contract size = 1, pip = 1 => $1 за пункт (стандарт CFD)
  if (type === 'index') {
    return pipSize * cs;
  }
  return null;
}

// Шаг цены (для перевода дистанции в "пункты" когда нужно)
function getPipSize(instrument) {
  return parseFloat(instrument.selectedOptions[0].dataset.pip);
}

function getDigits(instrument) {
  return parseInt(instrument.selectedOptions[0].dataset.digits) || 5;
}

function getInstrumentType(instrument) {
  return instrument.selectedOptions[0].dataset.type;
}

// Контрактный размер (units на 1 лот)
function getContractSize(instrument) {
  const type = getInstrumentType(instrument);
  if (type.startsWith('fx_')) return 100000;
  if (type === 'metal_xau') return 100;
  if (type === 'metal_xag') return 5000;
  if (type === 'index') return parseFloat(instrument.selectedOptions[0].dataset.cs || 1);
  return 100000;
}

// Маржа на 1 лот
// Forex: (contract_size * price_in_USD) / leverage
// Для XXX/USD: contract * entry / lev
// Для USD/XXX: contract / lev (база — USD)
// Для кроссов: contract * (base→USD rate) / lev — упрощаем через entry и quoteRate
// Для металлов и индексов: contract * entry / leverage
function getMarginPerLot(instrument, entry, quoteRate, leverage) {
  if (!entry || !leverage) return null;
  const type = getInstrumentType(instrument);
  const cs = getContractSize(instrument);

  if (type === 'fx_usd_quote') {
    // EUR/USD: 100000 EUR * EURUSD = USD value, /lev
    return (cs * entry) / leverage;
  }
  if (type === 'fx_usd_base' || type === 'fx_usd_base_jpy') {
    // USD/JPY: база 100000 USD, /lev
    return cs / leverage;
  }
  if (type === 'fx_cross' || type === 'fx_cross_jpy') {
    // Сложно без курса базы→USD. Аппроксимируем:
    // Margin (USD) на 1 лот = 100000 базы → нужен курс base→USD
    // Если quoteRate — это quote→USD, то base→USD ≈ entry * quoteRate
    if (!quoteRate || quoteRate <= 0) return null;
    return (cs * entry * quoteRate) / leverage;
  }
  if (type === 'metal_xau' || type === 'metal_xag') {
    return (cs * entry) / leverage;
  }
  if (type === 'index') {
    return (cs * entry) / leverage;
  }
  return null;
}

function autoFillQuoteHint() {
  const opt = els.instrument.selectedOptions[0];
  const type = opt.dataset.type;
  const quote = opt.dataset.quote;
  const entry = parseFloat(els.entry.value);

  if (type === 'fx_cross_jpy') {
    els.quoteRate.disabled = false;
    els.quoteHint.textContent = '(USD/JPY)';
    els.quoteRate.placeholder = 'напр. 154.50';
    // авто-подсказка: USDJPY ≈ entry / (EUR/USD приблиз 1.08) — но юзер сам введёт
  } else if (type === 'fx_cross') {
    els.quoteRate.disabled = false;
    els.quoteHint.textContent = `(${quote}/USD)`;
    els.quoteRate.placeholder = `напр. курс ${quote}/USD`;
  } else {
    els.quoteRate.disabled = true;
    els.quoteRate.value = '';
    els.quoteHint.textContent = '(не нужен)';
    els.quoteRate.placeholder = 'авто';
  }
}

// =========== MAIN CALCULATION ===========
function calculate() {
  const deposit = parseFloat(els.deposit.value);
  const entry = parsePrice(els.entry.value);
  const stop = parsePrice(els.stop.value);
  const take = parsePrice(els.take.value);
  const leverage = parseFloat(els.leverage.value);
  const quoteRate = parseFloat(els.quoteRate.value);
  const riskInput = parseFloat(els.riskValue.value);

  // Обновляем подсказки парсинга
  const digits = getDigits(els.instrument);
  updateParsedHint(els.entry, document.getElementById('entry-hint'), digits);
  updateParsedHint(els.stop, document.getElementById('stop-hint'), digits);
  updateParsedHint(els.take, document.getElementById('take-hint'), digits);

  // Очистка результата
  function clearResult(msg) {
    els.lots.textContent = '—';
    els.units.textContent = '— units';
    els.pipInfo.textContent = '—';
    els.riskResult.textContent = '—';
    els.profitResult.textContent = '—';
    els.slDistance.textContent = '—';
    els.rrResult.textContent = '—';
    els.marginResult.textContent = '—';
    els.marginPct.textContent = '—';
    if (msg) showWarning(msg, 'err'); else hideWarning();
  }

  if (!deposit || deposit <= 0) return clearResult('Укажи размер депозита');
  if (!riskInput || riskInput <= 0) return clearResult('Укажи риск');
  if (!entry || entry <= 0) return clearResult('Укажи цену входа');
  if (!stop || stop <= 0) return clearResult('Укажи цену стопа');
  if (entry === stop) return clearResult('Entry и Stop не могут быть равны');

  // Валидация направления
  if (state.direction === 'long' && stop >= entry) {
    return clearResult('Для LONG: стоп должен быть НИЖЕ входа');
  }
  if (state.direction === 'short' && stop <= entry) {
    return clearResult('Для SHORT: стоп должен быть ВЫШЕ входа');
  }

  // Riskat $
  const riskUSD = state.riskMode === 'percent'
    ? deposit * (riskInput / 100)
    : riskInput;

  if (riskUSD > deposit) return clearResult('Риск больше депозита');

  // SL distance в ценовых единицах
  const slPriceDist = Math.abs(entry - stop);

  // Pip value per lot
  const pipValue = getPipValuePerLot(els.instrument, entry, quoteRate);
  if (pipValue === null || isNaN(pipValue)) {
    if (els.instrument.selectedOptions[0].dataset.type.startsWith('fx_cross')) {
      return clearResult('Введи курс quote→USD для кросса');
    }
    return clearResult('Не могу рассчитать pip value');
  }

  const pipSize = getPipSize(els.instrument);
  const slPips = slPriceDist / pipSize;

  // Размер позиции в лотах
  // Loss per lot = slPips * pipValue
  // Lots = riskUSD / lossPerLot
  const lossPerLot = slPips * pipValue;
  if (lossPerLot <= 0) return clearResult('Ошибка расчёта');
  let lotsRaw = riskUSD / lossPerLot;
  // Округление вниз до 0.01
  let lots = Math.floor(lotsRaw * 100) / 100;
  let forcedMinLot = false; // флаг: принудительно поставлен минимальный лот
  if (lots < 0.01) {
    // Расчётный лот меньше минимального — ставим минимальный 0.01
    // и предупреждаем о превышении риска
    lots = 0.01;
    forcedMinLot = true;
  }

  // Выходные значения
  els.lots.textContent = lots.toFixed(2);
  const cs = getContractSize(els.instrument);
  const units = Math.round(lots * cs);
  els.units.textContent = `${units.toLocaleString('ru-RU')} units`;
  hideWarning();

  // Контекстная подпись pip value
  const instrType = getInstrumentType(els.instrument);
  if (instrType === 'metal_xau' || instrType === 'metal_xag' || instrType === 'index') {
    els.pipInfo.textContent = `$${pipValue.toFixed(2)}/pt × лот`;
  } else {
    els.pipInfo.textContent = `$${pipValue.toFixed(2)}/pip × лот`;
  }

  const actualRisk = lots * lossPerLot;
  const actualRiskPct = (actualRisk / deposit) * 100;
  els.riskResult.textContent = `$${actualRisk.toFixed(2)} (${actualRiskPct.toFixed(2)}%)`;

  // Если был поставлен минимальный лот — показать предупреждение
  if (forcedMinLot) {
    const targetRiskUSD = riskUSD;
    const overshoot = actualRiskPct;
    if (overshoot > 5) {
      showWarning(`⚠ Минимальный лот 0.01 даёт риск ${overshoot.toFixed(1)}% депо — это ОПАСНО. Заданный риск $${targetRiskUSD.toFixed(2)} слишком мал для такого SL. Сократи SL или увеличь депо.`, 'err');
    } else {
      showWarning(`Минимальный лот 0.01: реальный риск ${overshoot.toFixed(1)}% (выше заданного ${(targetRiskUSD/deposit*100).toFixed(1)}%). Это нормально для малого депо, но учитывай.`, 'warn');
    }
  }

  els.slDistance.textContent = formatDistance(slPriceDist, slPips, els.instrument);

  // TP / R:R
  if (take && take > 0) {
    // валидация TP
    let tpValid = true;
    if (state.direction === 'long' && take <= entry) tpValid = false;
    if (state.direction === 'short' && take >= entry) tpValid = false;

    if (tpValid && lots > 0) {
      const tpPriceDist = Math.abs(take - entry);
      const tpPips = tpPriceDist / pipSize;
      const profitPerLot = tpPips * pipValue;
      const totalProfit = lots * profitPerLot;
      const totalProfitPct = (totalProfit / deposit) * 100;
      const rr = tpPriceDist / slPriceDist;
      els.profitResult.textContent = `$${totalProfit.toFixed(2)} (${totalProfitPct.toFixed(2)}%)`;
      els.rrResult.textContent = `1:${rr.toFixed(2)}`;
      if (rr < 2) {
        showWarning(`R:R = 1:${rr.toFixed(2)} ниже 1:2 — слабый сетап`, 'warn');
      }
    } else if (!tpValid) {
      els.profitResult.textContent = 'TP не в ту сторону';
      els.rrResult.textContent = '—';
    }
  } else {
    els.profitResult.textContent = '—';
    els.rrResult.textContent = '—';
  }

  // Margin
  const marginPerLot = getMarginPerLot(els.instrument, entry, quoteRate, leverage);
  if (marginPerLot !== null && lots > 0) {
    const totalMargin = lots * marginPerLot;
    const marginPctOfDeposit = (totalMargin / deposit) * 100;
    els.marginResult.textContent = `$${totalMargin.toFixed(2)}`;
    els.marginPct.textContent = `${marginPctOfDeposit.toFixed(1)}%`;
    if (marginPctOfDeposit > 50) {
      showWarning(`Маржа ${marginPctOfDeposit.toFixed(0)}% депо — слишком много! Не хватит свободных средств для других позиций или просадки.`, 'margin');
    } else if (marginPctOfDeposit > 20 && !els.warning.classList.contains('warn-margin')) {
      // мягкое предупреждение, только если других нет
      if (!els.warning.classList.contains('visible')) {
        showWarning(`Маржа ${marginPctOfDeposit.toFixed(0)}% депо. Учти при открытии нескольких позиций.`, 'margin');
      }
    }
  } else {
    els.marginResult.textContent = '—';
    els.marginPct.textContent = '—';
  }

  saveState();
}

function formatDistance(priceDist, pips, instrument) {
  const type = getInstrumentType(instrument);
  const digits = getDigits(instrument);
  const opt = instrument.selectedOptions[0];
  // Для золота: показываем движение в $ + pts (1 pt = $0.01)
  if (type === 'metal_xau') {
    return `$${priceDist.toFixed(2)} (${Math.round(pips)} pts)`;
  }
  // Для серебра: $ + pts (1 pt = $0.001)
  if (type === 'metal_xag') {
    return `$${priceDist.toFixed(3)} (${Math.round(pips)} pts)`;
  }
  // Для индексов: pts с одной цифрой после запятой
  if (type === 'index') {
    return `${pips.toFixed(1)} pts`;
  }
  // Для FX: pips + points (5-digit)
  const points = pips * 10;
  return `${pips.toFixed(1)} pips / ${points.toFixed(0)} pts`;
}

function showWarning(msg, type) {
  els.warning.textContent = msg;
  els.warning.className = 'warning visible';
  if (type === 'warn' || type === 'margin') els.warning.classList.add('warn-margin');
}
function hideWarning() {
  els.warning.className = 'warning';
  els.warning.textContent = '';
}

// =========== UI HANDLERS ===========
function setRiskMode(mode) {
  state.riskMode = mode;
  document.querySelectorAll('#risk-mode button').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === mode);
  });
  // меняем плейсхолдер и пресеты
  if (mode === 'percent') {
    els.riskValue.placeholder = '%';
    document.getElementById('presets').innerHTML = `
      <button data-val="0.5">0.5%</button>
      <button data-val="1" class="active">1%</button>
      <button data-val="1.5">1.5%</button>
      <button data-val="2">2%</button>
      <button data-val="3">3%</button>`;
    els.riskValue.value = '1';
  } else {
    els.riskValue.placeholder = 'USD';
    document.getElementById('presets').innerHTML = `
      <button data-val="50">$50</button>
      <button data-val="100">$100</button>
      <button data-val="200">$200</button>
      <button data-val="500">$500</button>
      <button data-val="1000">$1000</button>`;
    els.riskValue.value = '100';
  }
  attachPresetHandlers();
  calculate();
}

function attachPresetHandlers() {
  document.querySelectorAll('#presets button').forEach(btn => {
    btn.addEventListener('click', () => {
      els.riskValue.value = btn.dataset.val;
      document.querySelectorAll('#presets button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      calculate();
    });
  });
}

function setDirection(dir) {
  state.direction = dir;
  document.querySelectorAll('#direction button').forEach(b => {
    b.classList.toggle('active', b.dataset.dir === dir);
  });
  calculate();
}

// Adjust input step based on instrument (no-op for text inputs)
function adjustInputSteps() {
  // text inputs не используют step — парсинг идёт через parsePrice
}

// =========== INIT ===========
document.querySelectorAll('#risk-mode button').forEach(b => {
  b.addEventListener('click', () => setRiskMode(b.dataset.mode));
});
document.querySelectorAll('#direction button').forEach(b => {
  b.addEventListener('click', () => setDirection(b.dataset.dir));
});
attachPresetHandlers();

[els.deposit, els.instrument, els.leverage, els.quoteRate, els.riskValue, els.entry, els.stop, els.take].forEach(el => {
  el.addEventListener('input', calculate);
  el.addEventListener('change', calculate);
});

els.instrument.addEventListener('change', () => {
  autoFillQuoteHint();
  adjustInputSteps();
  calculate();
});

document.getElementById('swap-btn').addEventListener('click', () => {
  const e = els.entry.value;
  els.entry.value = els.stop.value;
  els.stop.value = e;
  // переключаем направление автоматически
  setDirection(state.direction === 'long' ? 'short' : 'long');
});

document.getElementById('copy-btn').addEventListener('click', async () => {
  const text = `📊 ${els.instrument.value} ${state.direction.toUpperCase()}
Lots: ${els.lots.textContent} (${els.units.textContent})
Entry: ${els.entry.value} | SL: ${els.stop.value}${els.take.value ? ' | TP: ' + els.take.value : ''}
Risk: ${els.riskResult.textContent}
${els.take.value ? 'Profit: ' + els.profitResult.textContent + '\nR:R: ' + els.rrResult.textContent : ''}
Margin: ${els.marginResult.textContent} (${els.marginPct.textContent})`;
  try {
    await navigator.clipboard.writeText(text);
    const btn = document.getElementById('copy-btn');
    const orig = btn.textContent;
    btn.textContent = '✓ Скопировано';
    setTimeout(() => btn.textContent = orig, 1500);
  } catch(e) {
    alert(text);
  }
});

// RR-пресеты: подставляют TP по формуле Entry ± (SL_dist × RR)
document.querySelectorAll('#rr-presets button').forEach(btn => {
  btn.addEventListener('click', () => {
    const entry = parsePrice(els.entry.value);
    const stop = parsePrice(els.stop.value);
    if (isNaN(entry) || isNaN(stop) || entry === stop) {
      alert('Сначала введи Entry и Stop');
      return;
    }
    const rr = parseFloat(btn.dataset.rr);
    const slDist = Math.abs(entry - stop);
    const tpDist = slDist * rr;
    const digits = getDigits(els.instrument);
    let tp;
    if (state.direction === 'long') {
      // для long stop должен быть < entry, TP > entry
      if (stop >= entry) { alert('Для LONG: Stop должен быть НИЖЕ Entry'); return; }
      tp = entry + tpDist;
    } else {
      if (stop <= entry) { alert('Для SHORT: Stop должен быть ВЫШЕ Entry'); return; }
      tp = entry - tpDist;
    }
    els.take.value = tp.toFixed(digits);
    calculate();
  });
});

loadState();
autoFillQuoteHint();
adjustInputSteps();
calculate();

// SW регистрация
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
